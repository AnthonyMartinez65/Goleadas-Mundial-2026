<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial 2026 · Cruce de Datos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>⚽ Mundial 2026 · Cruce de Datos</h1>
    <p class="subtitle">FIFA World Cup 2026 · Live Data</p>
    <p id="status" aria-live="polite" class="status-banner"></p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="goleadas">🔥 Goleadas</button>
    <button class="tab-btn" data-tab="ruta-campeon">🏆 Ruta del Campeón</button>
    <button class="tab-btn" data-tab="muro">🧱 El Muro</button>
    <button class="tab-btn" data-tab="estadios">🏟️ Estadios</button>
  </nav>

  <main id="app">
    <section id="tab-goleadas" class="tab-content active">
      <p id="stats-goleadas" class="stats"></p>
      <div id="loading-goleadas" class="skeleton-grid"></div>
      <div id="tarjetas-goleadas" class="tarjetas-grid"></div>
    </section>

    <section id="tab-ruta-campeon" class="tab-content">
      <p class="hint">Selecciona un equipo para ver su itinerario.</p>
      <select id="selector-equipo"><option value="">Elige un equipo...</option></select>
      <div id="loading-ruta" class="skeleton-grid"></div>
      <div id="itinerario" class="tarjetas-grid"></div>
    </section>

    <section id="tab-muro" class="tab-content">
      <p class="hint">Los 5 equipos con menos goles en contra.</p>
      <div id="loading-muro" class="skeleton-grid"></div>
      <div id="ranking-muro" class="tarjetas-grid"></div>
    </section>

    <section id="tab-estadios" class="tab-content">
      <p class="hint">Asistencia potencial por estadio.</p>
      <div id="loading-estadios" class="skeleton-grid"></div>
      <div id="grafica-estadios"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
